<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
    <link rel="stylesheet" href="css/style2.css">
</head>
<body>
    <div class="test-wrapper">
        <h3 class="test-title">Виберіть правильну відповідь</h3>
        
        <table class="logic-table">
            <thead>
                <tr>
                    <th colspan="3" class="table-header-main">
                        Логічний елемент ВИКЛЮЧАЮЧЕ АБО НЕ<br>
                        (операція еквівалентності / рівнозначності)
                    </th>
                </tr>
                <tr>
                    <th class="table-header">Логічні<br>вирази</th>
                    <th class="table-header">Можливі<br>відповіді<br><br>1 &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; 0</th>
                    <th class="table-header">Для перевірки<br>прийнятого рішення<br>зробіть щиглик<br>по кнопці</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="table-cell logic-expression">0 ↔ 0 =</td>
                    <td class="table-cell">
                        <div class="radio-container">
                            <input type="radio" name="row1" value="1" class="radio-input">
                            <input type="radio" name="row1" value="0" class="radio-input">
                        </div>
                    </td>
                    <td class="table-cell">
                        <button class="check-btn" onclick="checkAnswer('row1', 1)">Перевірка</button>
                    </td>
                </tr>
                
                <tr>
                    <td class="table-cell logic-expression">0 ↔ 1 =</td>
                    <td class="table-cell">
                        <div class="radio-container">
                            <input type="radio" name="row2" value="1" class="radio-input">
                            <input type="radio" name="row2" value="0" class="radio-input">
                        </div>
                    </td>
                    <td class="table-cell">
                        <button class="check-btn" onclick="checkAnswer('row2', 0)">Перевірка</button>
                    </td>
                </tr>

                <tr>
                    <td class="table-cell logic-expression">1 ↔ 0 =</td>
                    <td class="table-cell">
                        <div class="radio-container">
                            <input type="radio" name="row3" value="1" class="radio-input">
                            <input type="radio" name="row3" value="0" class="radio-input">
                        </div>
                    </td>
                    <td class="table-cell">
                        <button class="check-btn" onclick="checkAnswer('row3', 0)">Перевірка</button>
                    </td>
                </tr>

                <tr>
                    <td class="table-cell logic-expression">1 ↔ 1 =</td>
                    <td class="table-cell">
                        <div class="radio-container">
                            <input type="radio" name="row4" value="1" class="radio-input">
                            <input type="radio" name="row4" value="0" class="radio-input">
                        </div>
                    </td>
                    <td class="table-cell">
                        <button class="check-btn" onclick="checkAnswer('row4', 1)">Перевірка</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="js/script2.js"></script>
</body>
</html>
